<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⛵</text></svg>">
    <title>Sea of Thieves WebGPU | WASM</title>
</head>
<body>
    <div id="ui">
        <h1 id="hud-title">Oceano Jogável</h1>
        <div class="hud-row"><strong>Motor</strong><span id="engine-status">Carregando...</span></div>
        <div class="hud-row"><strong>Render</strong><span id="render-status">Inicializando...</span></div>
        <div class="hud-row"><strong>Modo</strong><span id="mode-status">No convés</span></div>
        <div class="hud-row"><strong>Velocidade</strong><span id="speed-status">0.00 m/s</span></div>
        <div class="hud-row"><strong>Vela</strong><span id="sail-status">65%</span></div>
        <div class="hud-row"><strong>Âncora</strong><span id="anchor-status">Recolhida</span></div>
        <div class="hud-row"><strong>Vento</strong><span id="wind-status">7.0 m/s L</span></div>
        <div class="hud-row"><strong>Bússola</strong><span style="color:#ffd06c;font-size:0.85em">→ canto inferior direito</span></div>
        <p id="hint-status">Clique para capturar mouse e começar.</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
